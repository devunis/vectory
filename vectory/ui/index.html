<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vectory</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e4e4ef;
    --text2: #8888a0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --danger: #e74c3c;
    --success: #2ecc71;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent2); }
  header .status {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  header .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
  }
  .layout {
    display: flex;
    height: calc(100vh - 57px);
  }
  .sidebar {
    width: 280px;
    min-width: 280px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
  .collection-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .collection-item {
    padding: 12px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 0.15s;
  }
  .collection-item:hover { background: var(--surface2); }
  .collection-item.active { background: var(--accent); color: #fff; }
  .collection-item .name { font-size: 14px; font-weight: 600; }
  .collection-item .meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .collection-item.active .meta { color: rgba(255,255,255,0.7); }
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
  }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 15px; }
  .panel {
    max-width: 900px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .panel-header h2 { font-size: 24px; font-weight: 700; }
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    flex: 1;
  }
  .stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
  }
  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-body { padding: 20px; }
  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .form-group label {
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, textarea, select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5b4bd6; }
  .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .results-table th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .results-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table tr:hover td { background: var(--surface2); }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    animation: slideIn 0.3s ease;
  }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 420px;
    max-width: 90vw;
  }
  .modal h3 { font-size: 18px; margin-bottom: 20px; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .mono { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1><span>&#9670;</span> Vectory</h1>
  <div class="status"><div class="dot"></div> Connected</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Collections</h2>
      <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New</button>
    </div>
    <div class="collection-list" id="collectionList"></div>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      <p>Select a collection or create a new one</p>
      <button class="btn btn-primary" style="margin-top:16px" onclick="showCreateModal()">+ Create Collection</button>
    </div>
  </main>
</div>

<script>
const API = '';
let activeCollection = null;

// --- API helpers ---
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Collections ---
async function loadCollections() {
  try {
    const cols = await api('GET', '/collections');
    const list = document.getElementById('collectionList');
    if (cols.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">No collections yet</div>';
      return;
    }
    list.innerHTML = cols.map(c => `
      <div class="collection-item ${activeCollection === c.name ? 'active' : ''}" onclick="selectCollection('${c.name}')">
        <div class="name">${c.name}</div>
        <div class="meta">${c.dimension}D &middot; ${c.metric} &middot; ${c.count} vectors</div>
        <div style="margin-top:4px"><span class="badge">${(STORE_INFO[c.store_type]||{}).label||c.store_type}</span></div>
      </div>
    `).join('');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function selectCollection(name) {
  activeCollection = name;
  loadCollections();
  try {
    const col = await api('GET', `/collections/${name}`);
    renderCollection(col);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderCollection(col) {
  document.getElementById('mainContent').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <h2>${col.name}</h2>
        <button class="btn btn-danger btn-sm" onclick="deleteCollection('${col.name}')">Delete Collection</button>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="label">Vectors</div>
          <div class="value">${col.count.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="label">Dimension</div>
          <div class="value">${col.dimension}</div>
        </div>
        <div class="stat-card">
          <div class="label">Metric</div>
          <div class="value" style="font-size:20px">${col.metric}</div>
        </div>
        <div class="stat-card">
          <div class="label">Storage</div>
          <div class="value" style="font-size:20px">${(STORE_INFO[col.store_type]||{}).label||col.store_type}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">Insert Vectors</div>
        <div class="section-body">
          <div class="form-group" style="margin-bottom:12px">
            <label>Vectors (JSON array of arrays)</label>
            <textarea id="insertVectors" placeholder='[[0.1, 0.2, ...], [0.3, 0.4, ...]]'></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>IDs (optional, JSON array)</label>
              <input id="insertIds" placeholder='["id1", "id2"]'>
            </div>
            <div class="form-group">
              <label>Metadata (optional, JSON array)</label>
              <input id="insertMeta" placeholder='[{"key": "val"}, {}]'>
            </div>
          </div>
          <button class="btn btn-primary" onclick="insertVectors('${col.name}')">Insert</button>
        </div>
      </div>

      <div class="section">
        <div class="section-header">Search</div>
        <div class="section-body">
          <div class="form-row">
            <div class="form-group" style="flex:3">
              <label>Query Vector (JSON array)</label>
              <input id="searchQuery" placeholder='[0.1, 0.2, ...]'>
            </div>
            <div class="form-group" style="flex:1">
              <label>Top K</label>
              <input id="searchTopK" type="number" value="10" min="1" max="1000">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:12px">
            <label>Filter Metadata (optional, JSON object)</label>
            <input id="searchFilter" placeholder='{"category": "docs"}'>
          </div>
          <button class="btn btn-primary" onclick="searchVectors('${col.name}')">Search</button>
          <div id="searchResults" style="margin-top:16px"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">Get / Delete Vectors</div>
        <div class="section-body">
          <div class="form-group" style="margin-bottom:12px">
            <label>Vector IDs (JSON array)</label>
            <input id="vectorIds" placeholder='["id1", "id2"]'>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" onclick="getVectors('${col.name}')">Get</button>
            <button class="btn btn-danger" onclick="deleteVectors('${col.name}')">Delete</button>
          </div>
          <div id="getResults" style="margin-top:16px"></div>
        </div>
      </div>
    </div>
  `;
}

// --- Actions ---
async function insertVectors(name) {
  try {
    const body = { vectors: JSON.parse(document.getElementById('insertVectors').value) };
    const idsVal = document.getElementById('insertIds').value.trim();
    const metaVal = document.getElementById('insertMeta').value.trim();
    if (idsVal) body.ids = JSON.parse(idsVal);
    if (metaVal) body.metadata = JSON.parse(metaVal);
    const res = await api('POST', `/collections/${name}/vectors`, body);
    toast(`Inserted ${res.inserted_ids.length} vectors`);
    selectCollection(name);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function searchVectors(name) {
  try {
    const body = {
      query: JSON.parse(document.getElementById('searchQuery').value),
      top_k: parseInt(document.getElementById('searchTopK').value),
    };
    const filterVal = document.getElementById('searchFilter').value.trim();
    if (filterVal) body.filter_metadata = JSON.parse(filterVal);
    const results = await api('POST', `/collections/${name}/search`, body);
    const container = document.getElementById('searchResults');
    if (results.length === 0) {
      container.innerHTML = '<div style="color:var(--text2);font-size:13px;">No results found</div>';
      return;
    }
    container.innerHTML = `
      <table class="results-table">
        <thead><tr><th>Rank</th><th>ID</th><th>Score</th><th>Metadata</th></tr></thead>
        <tbody>${results.map((r, i) => `
          <tr>
            <td>${i + 1}</td>
            <td class="mono">${r.id}</td>
            <td>${r.score.toFixed(6)}</td>
            <td class="mono">${JSON.stringify(r.metadata)}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    `;
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function getVectors(name) {
  try {
    const ids = JSON.parse(document.getElementById('vectorIds').value);
    const results = await api('POST', `/collections/${name}/get`, { ids });
    const container = document.getElementById('getResults');
    container.innerHTML = `
      <table class="results-table">
        <thead><tr><th>ID</th><th>Vector (truncated)</th><th>Metadata</th></tr></thead>
        <tbody>${results.map(r => `
          <tr>
            <td class="mono">${r.id}</td>
            <td class="mono">[${r.vector.slice(0, 5).map(v => v.toFixed(4)).join(', ')}${r.vector.length > 5 ? ', ...' : ''}]</td>
            <td class="mono">${JSON.stringify(r.metadata)}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    `;
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteVectors(name) {
  try {
    const ids = JSON.parse(document.getElementById('vectorIds').value);
    const res = await api('POST', `/collections/${name}/delete`, { ids });
    toast(`Deleted ${res.deleted} vectors`);
    selectCollection(name);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteCollection(name) {
  if (!confirm(`Delete collection "${name}"?`)) return;
  try {
    await api('DELETE', `/collections/${name}`);
    activeCollection = null;
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <p>Select a collection or create a new one</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="showCreateModal()">+ Create Collection</button>
      </div>
    `;
    loadCollections();
    toast('Collection deleted');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// --- Create Modal ---
function showCreateModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal">
      <h3>Create Collection</h3>
      <div class="form-group" style="margin-bottom:12px">
        <label>Name</label>
        <input id="newName" placeholder="my_collection">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Dimension</label>
          <input id="newDim" type="number" value="384" min="1">
        </div>
        <div class="form-group">
          <label>Metric</label>
          <select id="newMetric">
            <option value="cosine">Cosine</option>
            <option value="euclidean">Euclidean</option>
            <option value="dot_product">Dot Product</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Vector Store</label>
        <select id="newStorage"></select>
        <div id="storeDesc" style="font-size:12px;color:var(--text2);margin-top:4px;"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createCollection()">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  populateStoreSelect();
  const nameInput = document.getElementById('newName');
  nameInput.focus();
  overlay.addEventListener('keydown', e => {
    if (e.key === 'Enter') createCollection();
    if (e.key === 'Escape') overlay.remove();
  });
}

async function createCollection() {
  try {
    const name = document.getElementById('newName').value.trim();
    const dimension = parseInt(document.getElementById('newDim').value);
    const metric = document.getElementById('newMetric').value;
    const store_type = document.getElementById('newStorage').value;
    if (!name) throw new Error('Name is required');
    await api('POST', '/collections', { name, dimension, metric, store_type });
    document.querySelector('.modal-overlay').remove();
    toast(`Collection "${name}" created`);
    await loadCollections();
    selectCollection(name);
  } catch (e) {
    toast(e.message, 'error');
  }
}

// --- Store descriptions ---
const STORE_INFO = {
  local:  { label: 'Local (NumPy)', desc: 'Built-in brute-force search with JSON persistence. No extra install needed.' },
  chroma: { label: 'ChromaDB', desc: 'Embedded vector DB with HNSW index. pip install chromadb' },
  faiss:  { label: 'FAISS', desc: 'Facebook AI Similarity Search. pip install faiss-cpu' },
  qdrant: { label: 'Qdrant', desc: 'High-performance vector DB with filtering. pip install qdrant-client' },
  milvus: { label: 'Milvus', desc: 'Scalable vector DB (milvus-lite). pip install pymilvus milvus-lite' },
};

let availableStores = ['local'];

async function loadStores() {
  try {
    availableStores = await api('GET', '/stores');
  } catch (e) {
    availableStores = ['local'];
  }
}

function populateStoreSelect() {
  const select = document.getElementById('newStorage');
  if (!select) return;
  select.innerHTML = availableStores.map(s => {
    const info = STORE_INFO[s] || { label: s, desc: '' };
    return `<option value="${s}">${info.label}</option>`;
  }).join('');
  select.onchange = () => {
    const desc = document.getElementById('storeDesc');
    const info = STORE_INFO[select.value] || {};
    if (desc) desc.textContent = info.desc || '';
  };
  select.dispatchEvent(new Event('change'));
}

// --- Init ---
(async () => {
  await loadStores();
  loadCollections();
})();
</script>
</body>
</html>
